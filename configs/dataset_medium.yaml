# Medium: Some regime shift between validation and test.
# Moderate difficulty — simple momentum degrades, but careful
# validation selection can still find something that generalizes.
#
# Quality gate: balanced regime mix in test, no regime dominates unfairly.
quality_gate:
  test_regime_min:   {2: 0.25}          # mean_reversion >= 25% of test days
  test_regime_max:   {3: 0.35}          # noisy <= 35% of test days
  oracle_min_information_ratio: 0.4

seed: 43
n_years: 5

regime_start: 0  # start in momentum

regime_transition:
  - [0.96, 0.02, 0.01, 0.01]
  - [0.02, 0.95, 0.02, 0.01]
  - [0.01, 0.02, 0.95, 0.02]
  - [0.02, 0.01, 0.02, 0.95]

momentum_signal:
  momentum: 0.0003
  low_vol: 0.00005
  mean_reversion: -0.0002
  noisy: 0.0

reversion_signal:
  momentum: -0.00005
  low_vol: 0.00005
  mean_reversion: 0.0003
  noisy: 0.0

lowvol_premium:
  momentum: 0.00005
  low_vol: 0.0003
  mean_reversion: 0.00005
  noisy: 0.0

transaction_cost_bps: 30
