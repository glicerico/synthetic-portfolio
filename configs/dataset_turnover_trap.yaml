# Turnover Trap: Mean-reversion signal is strong before costs,
# but the required turnover destroys net returns.
# A strategy that aggressively trades reversals will appear good
# on gross returns but terrible after transaction costs.
#
# Quality gate: reversion regime must dominate, and the gross oracle
# should beat EW but net-of-cost returns should be near EW.
quality_gate:
  test_regime_min:   {2: 0.40}          # mean_reversion >= 40% of test days
  oracle_min_information_ratio: 0.5     # gross signal exists
  # (net performance is validated separately via evaluator baseline check)

seed: 560
n_years: 5

regime_start: 2  # start in mean-reversion

regime_transition:
  - [0.90, 0.03, 0.05, 0.02]
  - [0.02, 0.90, 0.05, 0.03]
  - [0.02, 0.03, 0.93, 0.02]
  - [0.03, 0.03, 0.04, 0.90]

# Strong reversion signal (but costly to exploit)
reversion_signal:
  momentum: 0.0001
  low_vol: 0.0002
  mean_reversion: 0.0005
  noisy: 0.0001

momentum_signal:
  momentum: 0.0001
  low_vol: 0.00005
  mean_reversion: -0.0001
  noisy: 0.0

# HIGH transaction costs
transaction_cost_bps: 80
